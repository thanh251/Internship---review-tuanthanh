      <div>
        <h1 class="relative z-10 text-center pt-10 pb-2 ">
          Available Budget in March 2026: 
        </h1>
        <div id="budget-total" class="text-7xl font-thin mt-3 mb-8 tracking tight text-center">
          - 0.00
        </div>
      </div>

      <div class="relative z-10 w-full px-20 py-4 max-w-4xl mx-auto">
        <div class="flex justify-between items-center bg-teal-500 px-10 py-4 mb-0.5 text-sm font-bold uppercase tracking-widest">
          <span>Income</span>
          <div class="flex items-center justify-between gap-4">
            <span id="budget-income">+ 0.00</span>
            <span id="budget-income-perc" class="bg-white/20 px-2 py-0.5 text-xs rounded-sm">--</span>
          </div>
        </div>
        <div class="flex justify-between items-center bg-red-500 px-10 py-4 text-sm font-bold uppercase tracking-widest">
          <span>Expenses</span>
          <div class="flex items-center justify-between gap-4">
            <span id="budget-expenses">- 0.00</span>
            <span id="budget-expenses-perc" class="bg-white/20 px-2 py-0.5 text-xs rounded-sm">--</span>
          </div>
        </div>
      </div>
    </section>

    <div class="bg-gray-200 border-b border-gray-300">
      <div class="max-w-4xl mx-auto px-6 py-4 flex items-center gap-3">
        <select id="add-type" class="bg-white border border-gray-300 rounded px-3 py-2 text-sm font-bold text-teal-600 focus:outline-none focus:ring-2 focus:ring-teal-400 cursor-pointer">
          <option value="inc">+</option>
          <option value="exp">-</option>
        </select>
        <input id="add-description" type="text" placeholder="Add description"
          class="flex-1 border border-gray-300 rounded px-4 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-gray-400">
        <input id="add-value" type="number" placeholder="Value" min="0"
          class="w-36 border border-gray-300 rounded px-4 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-gray-400">
        </button>
      </div>
    </div>


    <div class="max-w-4xl mx-auto px-6 py-8 grid grid-cols-2 gap-12">

      <div>
        <h3 class="text-teal-500 font-bold text-sm uppercase tracking-widest mb-5 pb-2 border-b border-teal-200">Income</h3>
        <ul id="income-list" class="space-y-3"></ul>
      </div>


      <div>
        <h3 class="text-red-500 font-bold text-sm uppercase tracking-widest mb-5 pb-2 border-b border-red-200">Expenses</h3>
        <ul id="expenses-list" class="space-y-3"></ul>
      </div>

    </div>
